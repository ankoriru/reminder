<div id="custom" class="tab">
    <h3>Custom уведомления</h3>
    <form action="/add_custom" method="post" style="background: #f9f9f9; padding: 15px; border-radius: 8px;">
        <label>Текст сообщения:</label>
        <textarea name="text" style="width:100%; height: 60px;" required></textarea>
        
        <label>Время (и дата для единоразовых):</label>
        <input type="datetime-local" name="dt" required style="width:100%; margin-bottom: 10px;">
        
        <label>Режим повтора:</label>
        <select name="period" id="period-select" onchange="toggleDays()" style="width:100%; margin-bottom: 10px;">
            <option value="once">Единоразово</option>
            <option value="workdays">Рабочие дни (Пн-Пт)</option>
            <option value="weekdays">Выбрать свои дни недели</option>
        </select>

        <div id="days-picker" style="display:none; margin-bottom: 10px; padding: 10px; border: 1px dashed #ccc;">
            <label><input type="checkbox" name="days" value="0"> Пн</label>
            <label><input type="checkbox" name="days" value="1"> Вт</label>
            <label><input type="checkbox" name="days" value="2"> Ср</label>
            <label><input type="checkbox" name="days" value="3"> Чт</label>
            <label><input type="checkbox" name="days" value="4"> Пт</label>
            <label><input type="checkbox" name="days" value="5"> Сб</label>
            <label><input type="checkbox" name="days" value="6"> Вс</label>
        </div>

        <button type="submit" style="background: #28a745; color: white; width: 100%; padding: 10px; border: none; border-radius: 5px; cursor: pointer;">💾 Сохранить</button>
    </form>

    <table>
        <tr><th>Текст</th><th>Время</th><th>Режим</th><th>Действие</th></tr>
        {% for c in customs %}
        <tr>
            <td>{{c.text}}</td>
            <td>{{c.dt}}</td>
            <td>
                {% if c.period == 'once' %} Раз {% else %} Дни недели {% endif %}
            </td>
            <td><a href="/delete_custom/{{c.id}}" style="color:red; text-decoration:none;">❌ Удалить</a></td>
        </tr>
        {% endfor %}
    </table>
</div>

<script>
function toggleDays() {
    const val = document.getElementById('period-select').value;
    document.getElementById('days-picker').style.display = (val === 'weekdays') ? 'block' : 'none';
}
</script>
