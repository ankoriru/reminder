        <div class="form-box">
            <form action="/add_ai_task" method="post" id="aiTaskForm">
                <label><b>Название задачи:</b></label>
                <input type="text" name="name" placeholder="Например: Утренняя мотивация" required>

                <label><b>Что должен написать ИИ (промпт):</b></label>
                <textarea name="prompt_template" placeholder="Например: Напиши короткое мотивационное сообщение для команды на начало рабочей недели. Пожелай продуктивной недели и хорошего настроения." required></textarea>

                <label><b>Дополнительный контекст (опционально):</b></label>
                <textarea name="context" placeholder="Дополнительная информация, которую ИИ может использовать (например: текущие проекты, важные даты)"></textarea>

                <label><b>Время отправки (ЧЧ:ММ):</b></label>
                <input type="time" name="schedule_time" required value="09:00">

                <label><b>Модель ИИ:</b></label>
                <select name="model_hint">
                    <option value="gpt-4o-mini">gpt-4o-mini (быстрая, дешевая)</option>
                    <option value="gpt-4o">gpt-4o (умная, дороже)</option>
                    <option value="claude-3-5-sonnet">claude-3-5-sonnet (лучшая для русского)</option>
                    <option value="deepseek-chat">deepseek-chat (дешевая альтернатива)</option>
                </select>
                <small style="color: var(--text-muted); display: block; margin-top: -15px; margin-bottom: 15px;">Укажите в переменной VSEGPT_MODEL</small>

                <label><b>Периодичность:</b></label>
                <select name="period" id="periodSelect" onchange="togglePeriodOptions()">
                    <option value="once">📅 Один раз (точная дата)</option>
                    <option value="daily" selected>📆 Каждый день</option>
                    <option value="workdays">💼 Рабочие дни (Пн-Пт)</option>
                    <option value="weekdays">📌 По выбранным дням недели</option>
                    <option value="weekly">🗓️ Еженедельно</option>
                    <option value="monthly">📅 Раз в месяц</option>
                    <option value="yearly">🎉 Раз в год</option>
                </select>
